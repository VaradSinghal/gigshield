name: gigkavach
description: "GigKavach - Unified Gig Worker Operating System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  percent_indicator: ^4.2.3
  intl: ^0.20.2
  supabase_flutter: ^2.12.2
  flutter_dotenv: ^6.0.0
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/gigkavach-logo.svg